services:
  db:
    image: postgres:16-alpine
    container_name: event_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: event_planner
      POSTGRES_PASSWORD: event_planner
      POSTGRES_DB: event_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_planner -d event_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_planner_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://event_planner:event_planner@db:5432/event_planner
      DEBUG: "true"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
